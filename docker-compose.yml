# optional local mysql — match DATABASE_URL in backend/.env
services:
  mysql:
    image: mysql:8.0
    ports:
      - "3306:3306"
    environment:
      MYSQL_ROOT_PASSWORD: root_local
      MYSQL_DATABASE: dream_health_foods
      MYSQL_USER: dream
      MYSQL_PASSWORD: dream_local
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
