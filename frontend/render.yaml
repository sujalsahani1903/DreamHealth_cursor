# Repo root must be `frontend` OR set rootDir below at repo root blueprint
services:
  - type: web
    name: dream-health-ui
    runtime: static
    buildCommand: npm ci && npm run build
    staticPublishPath: dist
    headers:
      - path: /assets/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /index.html
        name: Cache-Control
        value: no-cache, no-store, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
