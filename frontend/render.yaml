# Render Static Site — connect repo, set root directory to `frontend`
services:
  - type: web
    name: dream-health-storefront
    runtime: static
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        sync: false
